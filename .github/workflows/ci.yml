name: ci

on:
    push:
        branches: ['**']

jobs:
    check-and-test:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install consumer dependencies
              run: npm ci
              env:
                  HUSKY: '0'

            - run: npm run install:demos

            - name: Build workspace (embed CLI for generate:all)
              run: npm run langium:generate && npm run build
            - run: npm run generate:all
            - run: npm run build:generated --prefix packages/extension/demos
            - run: npm run check
            - run: npm run test
