name: ci

# Quality gate: runs only on release tags (see guided-release skill CP6).
# Branch pushes do not run CI — local link pin and gitignored build stamp are OK during dev.

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

jobs:
    check-and-test:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Verify tag matches package.json version
              run: |
                  TAG="${GITHUB_REF_NAME#v}"
                  VERSION="$(node -p "require('./package.json').version")"
                  if [ "$TAG" != "$VERSION" ]; then
                      echo "::error::Tag v${TAG} does not match package.json version ${VERSION}"
                      exit 1
                  fi

            - name: Install consumer dependencies
              run: npm ci
              env:
                  HUSKY: '0'

            - run: npm run install:demos

            - name: Build workspace (embed CLI for generate:all)
              run: npm run langium:generate && npm run build
            - run: npm run generate:all
            - run: npm run build:generated --prefix packages/extension/demos
            - run: npm run check
            - run: npm run test
