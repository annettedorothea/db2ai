services:
    pagila:
        image: synthesizedio/pagila:1.2
        container_name: db2ai-pagila
        environment:
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: pagila
        ports:
            - '${PAGILA_HOST_PORT:-55432}:5432'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d pagila']
            interval: 5s
            timeout: 5s
            retries: 30
            start_period: 60s
        restart: unless-stopped
    sakila:
        image: sakiladb/mysql:8
        container_name: db2ai-sakila
        ports:
            - '${SAKILA_HOST_PORT:-53306}:3306'
        healthcheck:
            test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -u sakila -pp_ssW0rd --silent']
            interval: 5s
            timeout: 5s
            retries: 30
            start_period: 60s
        restart: unless-stopped
    orders-postgres:
        image: postgres:16-alpine
        container_name: db2ai-orders-postgres
        environment:
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: orders_postgres
        ports:
            - '${ORDERS_POSTGRES_HOST_PORT:-55433}:5432'
        volumes:
            - ./orders-postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d orders_postgres']
            interval: 5s
            timeout: 5s
            retries: 30
            start_period: 20s
        restart: unless-stopped
    animals-sqlserver:
        profiles: [mssql]
        image: mcr.microsoft.com/mssql/server:2022-latest
        container_name: db2ai-animals-sqlserver
        environment:
            ACCEPT_EULA: 'Y'
            MSSQL_SA_PASSWORD: ${ANIMALS_SQLSERVER_SA_PASSWORD:-YourStrong!Passw0rd}
            MSSQL_PID: Developer
        ports:
            - '${ANIMALS_SQLSERVER_HOST_PORT:-55434}:1433'
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -C || exit 1'
                ]
            interval: 5s
            timeout: 5s
            retries: 36
            start_period: 90s
        restart: unless-stopped
    plants-oracle:
        profiles: [oracle]
        image: container-registry.oracle.com/database/free:latest-lite
        container_name: db2ai-plants-oracle
        shm_size: 1g
        environment:
            ORACLE_PWD: ${PLANTS_ORACLE_SYS_PASSWORD:-OracleDemo123}
        ports:
            - '${PLANTS_ORACLE_HOST_PORT:-55221}:1521'
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'echo "WHENEVER SQLERROR EXIT FAILURE" > /tmp/hc.sql && echo "CONNECT sys/$$ORACLE_PWD@//127.0.0.1:1521/FREEPDB1 AS SYSDBA" >> /tmp/hc.sql && echo "SELECT 1 FROM dual;" >> /tmp/hc.sql && echo "EXIT;" >> /tmp/hc.sql && sqlplus -s /nolog @/tmp/hc.sql'
                ]
            interval: 15s
            timeout: 10s
            retries: 40
            start_period: 120s
        restart: unless-stopped
