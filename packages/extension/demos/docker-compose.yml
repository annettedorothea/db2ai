services:
    pagila:
        image: synthesizedio/pagila:1.2
        container_name: db2ai-pagila
        environment:
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: pagila
        ports:
            - '${PAGILA_HOST_PORT:-55432}:5432'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d pagila']
            interval: 5s
            timeout: 5s
            retries: 30
            start_period: 60s
        restart: unless-stopped
    sakila:
        image: sakiladb/mysql:8
        container_name: db2ai-sakila
        ports:
            - '${SAKILA_HOST_PORT:-53306}:3306'
        healthcheck:
            test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -u sakila -pp_ssW0rd --silent']
            interval: 5s
            timeout: 5s
            retries: 30
            start_period: 60s
        restart: unless-stopped
    orders-demo:
        image: postgres:16-alpine
        container_name: db2ai-orders-demo
        environment:
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: orders_demo
        ports:
            - '${ORDERS_DEMO_HOST_PORT:-55433}:5432'
        volumes:
            - ./orders-demo/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d orders_demo']
            interval: 5s
            timeout: 5s
            retries: 30
            start_period: 20s
        restart: unless-stopped
