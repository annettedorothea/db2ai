services:
    pagila:
        image: synthesizedio/pagila:1.2
        container_name: db2ai-pagila
        environment:
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: pagila
        ports:
            - '${PAGILA_HOST_PORT:-5432}:5432'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d pagila']
            interval: 5s
            timeout: 5s
            retries: 30
            start_period: 60s
        restart: unless-stopped
